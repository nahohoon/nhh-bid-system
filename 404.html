<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>나라장터 입찰추천</title>
<script type="text/javascript">
  // ── GitHub Pages SPA 라우팅 (고객별 접속주소 지원) ──
  // 예: /yoonsung 직접 접속/새로고침 시 GitHub Pages가 이 404.html을 서빙 →
  //     /?/yoonsung 형태로 변환해 index.html로 리다이렉트.
  //     index.html의 복원 스크립트가 다시 /yoonsung 으로 주소를 되돌린다.
  // apex/유저 사이트(nhh.kr) 루트 서빙이므로 보존할 경로 세그먼트는 0.
  var pathSegmentsToKeep = 0;
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
    l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</head>
<body></body>
</html>
