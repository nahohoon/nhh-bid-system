<!-- ── GitHub Pages SPA 라우팅 복원 (고객별 접속주소 지원) ──
     404.html이 /yoonsung → /?/yoonsung 으로 보낸 경우, 원래 경로(/yoonsung)로 주소를 되돌린다.
     앱 스크립트보다 먼저 실행되어야 하므로 head 최상단에 위치. 루트 접속(nhh.kr)에서는 동작하지 않음. -->
<script type="text/javascript">
  (function(l) {
    if (l.search[1] === '/') {
      var decoded = l.search.slice(1).split('&').map(function(s) {
        return s.replace(/~and~/g, '&');
      }).join('?');
      window.history.replaceState(null, null,
        l.pathname.slice(0, -1) + decoded + l.hash
      );
    }
  }(window.location));
</script>
<title>나라장터 입찰추천 | 윤성건설</title>
<style>
/* ── 구글 폰트 ─────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

/* ── CSS 변수 (라이트 모드) ──────────────────── */
:root {
  --bg: #f4f6fb;
  --surface: #ffffff;
  --surface2: #f0f4fa;
  --border: #e2e8f0;
  --text: #0f1929;

  --a-border: #86efac;
  --a-badge: #16a34a;
  --a-text: #15803d;
  --a-bar: #22c55e;
  --a-info: #dcfce7;
  --a-info-text: #166534;

  --b-bg: #fffbeb;
  --b-border: #fcd34d;
  --b-badge: #d97706;
  --b-text: #b45309;
  --b-bar: #f59e0b;
  --b-info: #fef9c3;
  --b-info-text: #854d0e;

  --c-bg: #f8fafc;
  --c-border: #cbd5e1;
  --c-badge: #64748b;
  --c-text: #475569;
  --c-bar: #94a3b8;
  --c-info: #f1f5f9;
  --c-info-text: #475569;

  --kpi-a: #dcfce7;
  --kpi-a-icon: #16a34a;
  --kpi-b: #fef9c3;
  --kpi-b-icon: #ca8a04;
  --kpi-c: #f1f5f9;
  --kpi-c-icon: #64748b;
  --kpi-blue: #dbeafe;
  --kpi-blue-icon: #1d4ed8;
  --kpi-red: #fee2e2;
  --kpi-red-icon: #dc2626;
  --kpi-purple: #f3e8ff;
  --kpi-purple-icon: #7c3aed;

  --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
  --shadow: 0 4px 16px rgba(0,0,0,0.09);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.13);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-chip: 999px;
}

/* ── 다크 모드 ──────────────────────────────── */
[data-theme="dark"] {
  --bg: #0f1a2e;
  --surface: #172035;
  --surface2: #1e2a42;
  --border: #2a3a58;
  --text: #e8eef8;
  --text2: #8aa4c8;
  --text3: #4e6487;
  --primary: #3b82f6;
  --primary-light: #1e3a5f;
  --primary-fg: #ffffff;

  --a-bg: #052e16;
  --a-border: #166534;
  --a-badge: #16a34a;
  --a-text: #4ade80;
  --a-bar: #22c55e;
  --a-info: #14532d;
  --a-info-text: #86efac;

  --b-bg: #1c1600;
  --b-border: #854d0e;
  --b-badge: #ca8a04;
  --b-text: #fbbf24;
  --b-bar: #f59e0b;
  --b-info: #292000;
  --b-info-text: #fde68a;

  --c-bg: #0f172a;
  --c-border: #334155;
  --c-badge: #475569;
  --c-text: #94a3b8;
  --c-bar: #64748b;
  --c-info: #1e293b;
  --c-info-text: #94a3b8;

  --kpi-a: #052e16;
  --kpi-a-icon: #4ade80;
  --kpi-b: #1c1600;
  --kpi-b-icon: #fbbf24;
  --kpi-c: #1e293b;
  --kpi-c-icon: #94a3b8;
  --kpi-blue: #1e3a5f;
  --kpi-blue-icon: #60a5fa;
  --kpi-red: #3b0a0a;
  --kpi-red-icon: #f87171;
  --kpi-purple: #2e1065;
  --kpi-purple-icon: #c084fc;

  --shadow-sm: 0 1px 4px rgba(0,0,0,0.3);
  --shadow: 0 4px 16px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
}

/* ── 리셋 & 기본 ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
  -webkit-font-smoothing: antialiased;
}
button { cursor: pointer; border: none; background: none; font-family: inherit; }
input { font-family: inherit; }
a { text-decoration: none; color: inherit; }

/* ── 헤더 ────────────────────────────────────── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(10px);
}
.header-inner {
  max-width: 1280px; margin: 0 auto;
  padding: 12px 20px;
  display: flex; align-items: center; gap: 12px;
}
.logo-box {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--primary);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-box svg { color: white; }
.logo-text h1 { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2; }
.logo-text p { font-size: 11px; color: var(--text3); line-height: 1.2; }
.search-wrap {
  flex: 1; max-width: 360px; margin: 0 auto;
  position: relative;
}
.search-wrap .ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); }
.search-wrap input {
  width: 100%; height: 34px;
  padding: 0 12px 0 32px;
  font-size: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
}
.search-wrap input::placeholder { color: var(--text3); }
.header-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.updated-text { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.icon-btn {
  width: 34px; height: 34px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2);
  transition: background 0.2s, color 0.2s;
  position: relative;
}
.icon-btn:hover { background: var(--primary-light); color: var(--primary); }
.notif-dot {
  position: absolute; top: 5px; right: 5px;
  width: 7px; height: 7px; border-radius: 50%;
  background: #ef4444; border: 1.5px solid var(--surface);
}

/* ── 메인 레이아웃 ───────────────────────────── */
.main { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }
.section-gap { margin-bottom: 24px; }

/* ── 업체 배너 ───────────────────────────────── */
.company-banner {
  background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 50%, #3b82f6 100%);
  border-radius: var(--radius); padding: 20px 24px;
  color: white; position: relative; overflow: hidden;
  box-shadow: 0 6px 24px rgba(37,99,235,0.35);
}
.company-banner::after {
  content: ''; position: absolute; right: -40px; top: -40px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
  border-radius: 50%;
}
.banner-inner { position: relative; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; }
.banner-left h2 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.banner-left p { font-size: 11px; opacity: 0.75; margin-bottom: 8px; }
.banner-tags { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.banner-tag {
  font-size: 18px; font-weight: 800;
  background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
  padding: 8px 16px; border-radius: var(--radius-chip);
}
.banner-stats { display: flex; gap: 20px; }
.banner-stat { text-align: center; }
.banner-stat .val { font-size: 20px; font-weight: 800; font-family: 'JetBrains Mono', monospace; line-height: 1; }
.banner-stat .lbl { font-size: 10px; opacity: 0.7; margin-top: 2px; }
.banner-divider { width: 1px; background: rgba(255,255,255,0.25); align-self: stretch; }

/* ── KPI 카드 그리드 ─────────────────────────── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
}
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.2s, box-shadow 0.2s;
  animation: fadeUp 0.5s ease both;
}
.kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.kpi-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.kpi-body .lbl { font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 2px; }
.kpi-body .val { font-size: 24px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: var(--text); line-height: 1; }
.kpi-body .sub { font-size: 10px; color: var(--text3); margin-top: 3px; }

/* ── 필터 박스 ───────────────────────────────── */
.filter-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  box-shadow: var(--shadow-sm);
}
.filter-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
.filter-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
.filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.filter-label { font-size: 11px; font-weight: 600; color: var(--text3); width: 30px; flex-shrink: 0; }
.chip {
  padding: 5px 12px; border-radius: var(--radius-chip);
  font-size: 12px; font-weight: 600;
  border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2);
  transition: all 0.18s; cursor: pointer;
  min-height: 30px;
}
.chip:hover { border-color: var(--primary); color: var(--primary); }
.chip.active {
  background: var(--primary); color: white; border-color: var(--primary);
  box-shadow: 0 2px 8px rgba(37,99,235,0.3);
}
.filter-divider { width: 1px; height: 28px; background: var(--border); }
.filter-reset {
  margin-left: auto; font-size: 12px; font-weight: 600;
  color: var(--primary); cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  padding: 4px 8px; border-radius: var(--radius-sm);
  transition: background 0.18s;
}
.filter-reset:hover { background: var(--primary-light); }
.filter-result { font-size: 11px; color: var(--text3); margin-top: 10px; }
.filter-result span { font-weight: 700; color: var(--primary); }

/* ── 섹션 헤더 ───────────────────────────────── */
.section-hdr {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-radius: var(--radius);
  border: 1px solid; margin-bottom: 16px;
  cursor: default; user-select: none;
  transition: opacity 0.18s;
}
.section-hdr.grade-a { background: linear-gradient(to right, #f0fdf4, #dcfce7); border-color: var(--a-border); }
.section-hdr.grade-b { background: linear-gradient(to right, #fffbeb, #fef9c3); border-color: var(--b-border); }
.section-hdr.grade-c { background: linear-gradient(to right, #f8fafc, #f1f5f9); border-color: var(--c-border); cursor: pointer; }
[data-theme="dark"] .section-hdr.grade-a { background: linear-gradient(to right, #052e16, #14532d); }
[data-theme="dark"] .section-hdr.grade-b { background: linear-gradient(to right, #1c1600, #292000); }
[data-theme="dark"] .section-hdr.grade-c { background: linear-gradient(to right, #0f172a, #1e293b); }
.grade-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 800;
  padding: 3px 10px; border-radius: var(--radius-chip); flex-shrink: 0;
}
.grade-a .grade-badge { background: var(--a-badge); color: white; }
.grade-b .grade-badge { background: var(--b-badge); color: white; }
.grade-c .grade-badge { background: var(--c-badge); color: white; }
.section-title { font-size: 14px; font-weight: 700; color: var(--text); }
.section-count { font-size: 14px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
.grade-a .section-count { color: var(--a-text); }
.grade-b .section-count { color: var(--b-text); }
.grade-c .section-count { color: var(--c-text); }
.toggle-hint { margin-left: auto; font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }

/* ── 카드 그리드 ─────────────────────────────── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.empty-msg { text-align: center; color: var(--text3); font-size: 13px; padding: 32px 0; }

/* ── 입찰 카드 ───────────────────────────────── */
.bid-card {
  border: 1px solid; border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: transform 0.22s, box-shadow 0.22s;
  animation: fadeUp 0.45s ease both;
  display: flex; flex-direction: column;
}
.bid-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.bid-card.grade-a { background: var(--a-bg); border-color: var(--a-border); }
.bid-card.grade-b { background: var(--b-bg); border-color: var(--b-border); }
.bid-card.grade-c { background: var(--c-bg); border-color: var(--c-border); }

.card-stripe { height: 4px; }
.grade-a .card-stripe { background: var(--a-bar); }
.grade-b .card-stripe { background: var(--b-bar); }
.grade-c .card-stripe { background: var(--c-bar); }

.card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 10px; }

.card-head { display: flex; align-items: flex-start; gap: 6px; flex-wrap: wrap; }
.card-grade-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 800;
  padding: 2px 7px; border-radius: var(--radius-chip);
  flex-shrink: 0;
}
.grade-a .card-grade-badge { background: var(--a-badge); color: white; }
.grade-b .card-grade-badge { background: var(--b-badge); color: white; }
.grade-c .card-grade-badge { background: var(--c-badge); color: white; }
.card-num { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--text3); flex-shrink: 0; margin-top: 2px; }
.urgent-tag {
  margin-left: auto; display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 800;
  background: #ef4444; color: white;
  padding: 2px 7px; border-radius: var(--radius-chip);
  animation: pulse 1.5s infinite;
}
.restrict-tag {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 600;
  background: #fee2e2; color: #b91c1c;
  border: 1px solid #fca5a5;
  padding: 2px 7px; border-radius: var(--radius-chip);
  flex-shrink: 0;
}
[data-theme="dark"] .restrict-tag { background: #3b0a0a; color: #f87171; border-color: #7f1d1d; }

/* ── 신뢰도 배지 ─────────────────────────────── */
.rel-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 800;
  padding: 2px 7px; border-radius: var(--radius-chip);
  border: 1px solid transparent; flex-shrink: 0;
}
.rel-badge.rel-a { background: #dcfce7; color: #15803d; border-color: #86efac; }
.rel-badge.rel-b { background: #dbeafe; color: #1d4ed8; border-color: #93c5fd; }
.rel-badge.rel-c { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
.rel-badge.rel-ref { background: #f8fafc; color: #94a3b8; border-color: #e2e8f0; }
[data-theme="dark"] .rel-badge.rel-a { background: #052e16; color: #4ade80; border-color: #166534; }
[data-theme="dark"] .rel-badge.rel-b { background: #1e3a5f; color: #60a5fa; border-color: #1d4ed8; }
[data-theme="dark"] .rel-badge.rel-c { background: #1e293b; color: #94a3b8; border-color: #334155; }
[data-theme="dark"] .rel-badge.rel-ref { background: #172035; color: #4e6487; border-color: #2a3a58; }

/* ── 추천 사정률 범위 ─────────────────────────── */
.rate-range-row {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--text2);
}
.rate-range-row svg { flex-shrink: 0; color: var(--text3); }
.rate-range-row b { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--text); }

/* ── 경쟁도 배지 ─────────────────────────────── */
.comp-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 800;
  padding: 2px 7px; border-radius: var(--radius-chip);
  border: 1px solid transparent; flex-shrink: 0;
}
.comp-badge.comp-low  { background: #dcfce7; color: #15803d; border-color: #86efac; }
.comp-badge.comp-mid  { background: #fef9c3; color: #b45309; border-color: #fcd34d; }
.comp-badge.comp-high { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
.comp-badge.comp-ref  { background: #f8fafc; color: #94a3b8; border-color: #e2e8f0; }
[data-theme="dark"] .comp-badge.comp-low  { background: #052e16; color: #4ade80; border-color: #166534; }
[data-theme="dark"] .comp-badge.comp-mid  { background: #1c1600; color: #fbbf24; border-color: #854d0e; }
[data-theme="dark"] .comp-badge.comp-high { background: #3b0a0a; color: #f87171; border-color: #7f1d1d; }
[data-theme="dark"] .comp-badge.comp-ref  { background: #172035; color: #4e6487; border-color: #2a3a58; }

/* ── 발주처 패턴 분석 ─────────────────────────── */
.owner-row {
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
  font-size: 11px; color: var(--text2);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 6px 9px;
}
.owner-row svg { flex-shrink: 0; color: var(--text3); }
.owner-row .owner-lbl { font-weight: 700; color: var(--text3); }
.owner-row b { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--text); }
.owner-row .owner-sep { color: var(--text3); }

.card-title { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.45; }

.card-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 10px; }
.meta-item { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 5px; }
.meta-item svg { flex-shrink: 0; color: var(--text3); }
.meta-item.money { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
.grade-a .meta-item.money { color: var(--a-text); }
.grade-b .meta-item.money { color: var(--b-text); }
.grade-c .meta-item.money { color: var(--c-text); }
.meta-item.urgent-date { color: #ef4444; font-weight: 700; }

.score-row { }
.score-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.score-label .lbl { font-size: 10px; color: var(--text3); display: flex; align-items: center; gap: 3px; }
.score-label .val { font-size: 13px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
.grade-a .score-label .val { color: var(--a-text); }
.grade-b .score-label .val { color: var(--b-text); }
.grade-c .score-label .val { color: var(--c-text); }
.score-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
.grade-a .score-bar-fill { background: var(--a-bar); }
.grade-b .score-bar-fill { background: var(--b-bar); }
.grade-c .score-bar-fill { background: var(--c-bar); }

.reason-box {
  font-size: 11px; line-height: 1.55;
  border-radius: var(--radius-sm); padding: 8px 10px;
  display: flex; align-items: flex-start; gap: 6px;
}
.grade-a .reason-box { background: var(--a-info); color: var(--a-info-text); }
.grade-b .reason-box { background: var(--b-info); color: var(--b-info-text); }
.grade-c .reason-box { background: var(--c-info); color: var(--c-info-text); }
.reason-box svg { flex-shrink: 0; margin-top: 1px; }

.card-btns { display: flex; gap: 8px; margin-top: auto; }
.btn {
  flex: 1; height: 32px; border-radius: var(--radius-sm);
  font-size: 11px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  transition: all 0.18s; border: 1px solid transparent;
}
.btn-outline {
  background: var(--surface); border-color: var(--border); color: var(--text2);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.grade-a .btn-fill { background: var(--a-badge); color: white; }
.grade-a .btn-fill:hover { background: #15803d; }
.grade-b .btn-fill { background: var(--b-badge); color: white; }
.grade-b .btn-fill:hover { background: #92400e; }
.grade-c .btn-fill { background: var(--c-badge); color: white; }
.grade-c .btn-fill:hover { background: #334155; }

/* ── 제외 공고 접기 ───────────────────────────── */
.c-section-content { overflow: hidden; transition: max-height 0.4s ease; }
.c-collapsed-hint { text-align: center; font-size: 11px; color: var(--text3); padding: 8px 0; }

/* ── 푸터 ────────────────────────────────────── */
.footer {
  border-top: 1px solid var(--border);
  padding: 24px 0 40px;
  text-align: center;
}
.footer .name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.footer .sub { font-size: 11px; color: var(--text3); }
.footer .note { font-size: 10px; color: var(--text3); margin-top: 4px; opacity: 0.7; }

/* ── 상세 모달 ───────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
  padding: 20px;
}
.modal-overlay.active {
  opacity: 1; pointer-events: auto;
}
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  width: 100%; max-width: 520px;
  max-height: 90vh; overflow-y: auto;
  transform: translateY(20px);
  transition: transform 0.25s;
}
.modal-overlay.active .modal-box {
  transform: translateY(0);
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--surface); z-index: 1;
}
.modal-title { font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
.modal-close {
  width: 30px; height: 30px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  background: var(--surface2); color: var(--text2);
  transition: background 0.18s, color 0.18s;
  flex-shrink: 0;
}
.modal-close:hover { background: #fee2e2; color: #dc2626; }
.modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.modal-grade-row {
  display: flex; align-items: center; gap: 10px;

}
.modal-bid-name { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.45; flex: 1; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.modal-field { display: flex; flex-direction: column; gap: 4px; }
.modal-field-label {
  font-size: 10px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.modal-field-value { font-size: 13px; font-weight: 600; color: var(--text); }
.modal-reason {

}
.modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}

/* ── 투찰전략 (카드 권장형 요약 행) ──────────── */
.strategy-row {
  display: flex; align-items: center; gap: 5px; flex-wrap: wrap;

}
.strategy-row svg { flex-shrink: 0; color: var(--text3); }

.strategy-row b { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--text); }
.strategy-row .strat-sep { color: var(--text3); }

/* ── 투찰전략 (상세 모달 3단 그리드) ─────────── */
.strategy-block { display: flex; flex-direction: column; gap: 6px; }
.strategy-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.strat-card {
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 10px 8px; text-align: center;
  background: var(--surface2);
}
.strat-card.strat-aggressive { background: #fef2f2; border-color: #fca5a5; }
.strat-card.strat-recommended { background: var(--primary-light); border-color: var(--primary); }
.strat-card.strat-safe { background: #f0fdf4; border-color: #86efac; }
[data-theme="dark"] .strat-card.strat-aggressive { background: #3b0a0a; border-color: #7f1d1d; }
[data-theme="dark"] .strat-card.strat-recommended { background: #1e3a5f; border-color: #1d4ed8; }
[data-theme="dark"] .strat-card.strat-safe { background: #052e16; border-color: #166534; }
.strat-card .strat-name {
  font-size: 10px; font-weight: 800; margin-bottom: 6px;
  display: inline-flex; align-items: center; gap: 3px;
}
.strat-card.strat-aggressive .strat-name { color: #dc2626; }

.strat-card.strat-safe .strat-name { color: #15803d; }
[data-theme="dark"] .strat-card.strat-aggressive .strat-name { color: #f87171; }

.strat-card .strat-amt { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--text2); margin-top: 4px; }

/* ── 애니메이션 ──────────────────────────────── */
@keyframes fadeUp {

  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {

/* ═══ 설정 ══════════════════════════════════════════════════ */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyHQNrpPcLyaRNxUS74Cft1AehaNnBPhQwyAymcgiYGQNGiPkNw7DVQPEUSYsjOhhI7/exec';

/* ═══ 고객별 접속주소 (업체코드 라우팅) ══════════════════════
   URL pathname에서 업체코드 추출 → 표시명만 변경. (데이터/계산/시트 로직 미변경)
   예: /yoonsung → 'yoonsung', / (루트) → 'default'(기존 화면 유지)
   미등록 코드도 기존 화면 그대로 유지.
════════════════════════════════════════════════════════════ */
const COMPANY_MAP = {
  yoonsung: { name: '윤성건설', title: '윤성건설 입찰분석 시스템' },
};

function getCompanyCode() {
  const seg = window.location.pathname.replace(/^\/+|\/+$/g, '').split('/')[0].toLowerCase();
  return seg || 'default';
}

function applyCompanyBranding() {
  const company = COMPANY_MAP[getCompanyCode()];
  if (!company) return; // default·미등록 코드 → 기존 화면 유지
  document.title = company.title;

/* ═══ 데이터 정규화 ══════════════════════════════════════════
   Google Sheets 값은 숫자·불리언이 문자열로 올 수 있어 변환합니다.
   restrict: "TRUE" / "있음" / true  → true
   amount / score: "187000000" → 187000000
════════════════════════════════════════════════════════════ */
function normalizeBid(item, i) {
  return {
    ...item,
    id: i + 1,
    amount:   Number(item.amount)  || 0,
    score:    Number(item.score)   || 0,
    restrict: item.restrict === true
           || item.restrict === 'TRUE'
           || item.restrict === '있음'
           || item.restrict === 'Y',
    grade:    String(item.grade).trim().toUpperCase(),
    detailUrl: item.detailUrl || 'https://www.g2b.go.kr/',
    reliability: item.reliability != null ? String(item.reliability).trim() : '',
    rate:     Number(item.rate) || 0,
    rateMin:  item.rateMin !== '' && item.rateMin != null ? Number(item.rateMin) : '',
    rateMax:  item.rateMax !== '' && item.rateMax != null ? Number(item.rateMax) : '',
    rateRange: item.rateRange != null ? String(item.rateRange).trim() : '',
    avgParticipants: item.avgParticipants !== '' && item.avgParticipants != null ? Number(item.avgParticipants) : '',
    competitionLevel: item.competitionLevel != null ? String(item.competitionLevel).trim() : '',
    ownerRate: item.ownerRate !== '' && item.ownerRate != null ? Number(item.ownerRate) : '',
    ownerCount: item.ownerCount !== '' && item.ownerCount != null ? Number(item.ownerCount) : '',
    ownerReliability: item.ownerReliability != null ? String(item.ownerReliability).trim() : '',
    /* ── 투찰전략 (공격형·권장형·안정형) ── 추가 필드 ── */
    aggressiveRate:   item.aggressiveRate   !== '' && item.aggressiveRate   != null ? Number(item.aggressiveRate)   : '',
    recommendedRate:  item.recommendedRate  !== '' && item.recommendedRate  != null ? Number(item.recommendedRate)  : '',
    safeRate:         item.safeRate         !== '' && item.safeRate         != null ? Number(item.safeRate)         : '',
    aggressiveAmount: item.aggressiveAmount !== '' && item.aggressiveAmount != null ? Number(item.aggressiveAmount) : '',
    recommendedAmount:item.recommendedAmount!== '' && item.recommendedAmount!= null ? Number(item.recommendedAmount): '',
    safeAmount:       item.safeAmount       !== '' && item.safeAmount       != null ? Number(item.safeAmount)       : '',
  };
}

════════════════════════════════════════════════════════════ */
async function loadBids() {
  if (!GAS_URL) {

}

/* ═══ 유틸 ══════════════════════════════════════════════════ */
function fmtMoney(n) {
  if (n >= 100000000) return (n/100000000).toFixed(1) + '억';
  if (n >= 10000) return Math.round(n/10000).toLocaleString() + '만';
  return n.toLocaleString();
}
function daysLeft(d) { return Math.ceil((new Date(d) - Date.now()) / 86400000); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const ZONE_EMO = {대구:'🏙️',경북:'🌾',인천:'⚓',서울:'🗼',부산:'🌊'};
const TYPE_EMO = {토목:'⛏️',포장:'🛣️',상하수도:'💧',철근콘크리트:'🏗️'};

/* ═══ 투찰전략 계산 (공격형·권장형·안정형) ═══════════════════
   우선순위: GAS JSON 값(aggressiveRate 등) → 없으면 rateMin/rateMax
   (또는 rateRange "min ~ max")로 클라이언트 계산.
   공격형 = 하한 + 범위×0.20 / 권장형 = +0.50 / 안정형 = +0.80
   투찰금액 = 기초금액 × 사정률 / 100. 사정률은 소수점 셋째 자리 반올림.
════════════════════════════════════════════════════════════ */
function round3(n) { return Math.round(n * 1000) / 1000; }

function getStrategies(b) {
  let aggR = b.aggressiveRate, recR = b.recommendedRate, safeR = b.safeRate;

  // JSON 값이 없으면 사정률범위로 계산
  if (aggR === '' || recR === '' || safeR === '') {
    let lo = b.rateMin, hi = b.rateMax;
    if ((lo === '' || hi === '' || lo == null || hi == null) && b.rateRange) {
      const m = String(b.rateRange).match(/([\d.]+)\s*~\s*([\d.]+)/);
      if (m) { lo = Number(m[1]); hi = Number(m[2]); }
    }
    if (lo !== '' && hi !== '' && lo != null && hi != null && !isNaN(lo) && !isNaN(hi)) {
      const span = hi - lo;
      aggR  = round3(lo + span * 0.20);
      recR  = round3(lo + span * 0.50);
      safeR = round3(lo + span * 0.80);
    }
  }

  const amt = (stored, rate) => {
    if (stored !== '' && stored != null) return Number(stored);
    if (rate !== '' && rate != null && b.amount) return Math.round(b.amount * rate / 100);
    return '';
  };

  return {
    aggR, recR, safeR,
    aggA:  amt(b.aggressiveAmount,  aggR),
    recA:  amt(b.recommendedAmount, recR),
    safeA: amt(b.safeAmount,        safeR),
  };
}

/* ═══ 필터링 ═════════════════════════════════════════════════ */
function filtered() {
  return BIDS.filter(b => {
    if (state.zone !== '전체') {
      if (state.zone === '기타') { if(['대구','경북'].includes(b.zone)) return false; }
      else { if(b.zone !== state.zone) return false; }
    }
    if (state.type !== '전체' && b.type !== state.type) return false;
    if (state.grade !== '전체' && b.grade !== state.grade) return false;
    if (state.search.trim()) {
      const q = state.search.toLowerCase();
      if (!b.name.toLowerCase().includes(q) && !b.org.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

      <div class="reason-box">${ico.info} <span>${esc(b.reason)}</span></div>
      <div class="card-btns">
        <button class="btn btn-outline" onclick="showDetail(${b.id})">${ico.search} 상세보기</button>
        <button class="btn btn-fill" onclick="openG2b(${b.id})">${ico.ext} 나라장터</button>
      </div>
    </div>
  </div>`;
}

/* ═══ 나라장터 바로가기 ═══════════════════════════════════════ */
function openG2b(id) {
  const b = BIDS.find(x => x.id === id);
  if (b) window.open(b.detailUrl || 'https://www.g2b.go.kr/', '_blank');
}

/* ═══ 렌더링 ═════════════════════════════════════════════════ */
function render() {
  const list = filtered();
  const byGrade = g => list.filter(b => b.grade === g);

  ['A','B','C'].forEach(g => {
    const items = byGrade(g);
    const grid = document.getElementById('grid' + g);
    const cnt  = document.getElementById('cnt'  + g);
    cnt.textContent = items.length + '건';
    if (items.length === 0) {
      grid.innerHTML = `<div class="empty-msg" style="grid-column:1/-1">조건에 맞는 공고가 없습니다.</div>`;
    } else {
      grid.innerHTML = items.map((b, i) => renderCard(b, i * 60)).join('');
    }
  });

  // 점수 바 애니메이션
  setTimeout(() => {
    document.querySelectorAll('.score-bar-fill').forEach(el => {
      el.style.width = el.dataset.w;
    });
  }, 80);

  // 필터 결과 표시
  const hasFilter = state.zone !== '전체' || state.type !== '전체' || state.grade !== '전체' || state.search.trim();
  const resultEl = document.getElementById('filterResult');
  const resetBtn = document.getElementById('resetBtn');
  resultEl.style.display = hasFilter ? '' : 'none';
  resetBtn.style.display  = hasFilter ? '' : 'none';
  resultEl.innerHTML = `필터 결과: <span>${list.length}건</span> / 전체 ${BIDS.length}건`;

  // 제외 공고 힌트
  const cItems = byGrade('C');
  document.getElementById('cHint').textContent =
    cOpen ? '' : (cItems.length > 0 ? `클릭하여 ${cItems.length}건의 제외 공고를 확인하세요` : '');
}

/* ═══ KPI ══════════════════════════════════════════════════ */
function renderKPI() {
  const countA = BIDS.filter(b=>b.grade==='A').length;
  const countB = BIDS.filter(b=>b.grade==='B').length;
  const countC = BIDS.filter(b=>b.grade==='C').length;
  const total  = BIDS.length;
  const urgent = BIDS.filter(b=>daysLeft(b.deadline)<=7).length;
  const totalAmt = BIDS.filter(b=>b.grade==='A'||b.grade==='B').reduce((s,b)=>s+b.amount, 0);

  const kpis = [
    { lbl:'강추 공고',   val:countA+'건', bg:'var(--kpi-a)', ic:'var(--kpi-a-icon)', sub:'즉시 입찰 검토',
      svg:`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>` },
    { lbl:'검토 공고',   val:countB+'건', bg:'var(--kpi-b)', ic:'var(--kpi-b-icon)', sub:'조건 확인 후 판단',
      svg:`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>` },
    { lbl:'제외 공고',   val:countC+'건', bg:'var(--kpi-c)', ic:'var(--kpi-c-icon)', sub:'자격 미달·지역 외',
      svg:`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>` },
    { lbl:'총 분석 공고', val:total+'건',  bg:'var(--kpi-blue)', ic:'var(--kpi-blue-icon)', sub:'오늘 기준 전체',
      svg:`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>` },
    { lbl:'마감 임박',   val:urgent+'건', bg:'var(--kpi-red)', ic:'var(--kpi-red-icon)', sub:'7일 이내 마감',
      svg:`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>` },
    { lbl:'총 기초금액', val:fmtMoney(totalAmt), bg:'var(--kpi-purple)', ic:'var(--kpi-purple-icon)', sub:'A+B 등급 합계',
      svg:`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="14" x="2" y="5" rx="2"/><path d="M2 10h20"/><circle cx="12" cy="15" r="1" fill="currentColor"/></svg>` },
  ];

  document.getElementById('kpiGrid').innerHTML = kpis.map((k,i) => `
    <div class="kpi-card" style="animation-delay:${i*70}ms">
      <div class="kpi-icon" style="background:${k.bg};color:${k.ic}">${k.svg}</div>
      <div class="kpi-body">
        <div class="lbl">${k.lbl}</div>
        <div class="val">${k.val}</div>
        <div class="sub">${k.sub}</div>
      </div>
    </div>`).join('');
}

/* ═══ C 섹션 접기/펼치기 ════════════════════════════════════ */
function toggleC() {
  cOpen = !cOpen;
  const el = document.getElementById('cSection');
  const hint = document.getElementById('toggleHint');
  if (cOpen) {
    el.style.maxHeight = '2000px';
    hint.innerHTML = `<svg id="toggleIco" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg> 접기`;
  } else {
    el.style.maxHeight = '0';
    hint.innerHTML = `<svg id="toggleIco" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg> 펼치기`;
  }
  const cItems = filtered().filter(b=>b.grade==='C');
  document.getElementById('cHint').textContent =
    cOpen ? '' : (cItems.length > 0 ? `클릭하여 ${cItems.length}건의 제외 공고를 확인하세요` : '');
}

/* ═══ 상세 모달 ══════════════════════════════════════════════ */
function showDetail(id) {
  const b = BIDS.find(x => x.id === id);
  if (!b) return;
  const days = daysLeft(b.deadline);
  const gradeLabel = b.grade === 'A' ? '강 추' : b.grade === 'B' ? '검 토' : '제 외';
  const gradeMark  = b.grade === 'A' ? '✓' : b.grade === 'B' ? '⚠' : '✕';
  const badgeBg    = b.grade === 'A' ? 'var(--a-badge)' : b.grade === 'B' ? 'var(--b-badge)' : 'var(--c-badge)';
  const infoBg     = b.grade === 'A' ? 'var(--a-info)'  : b.grade === 'B' ? 'var(--b-info)'  : 'var(--c-info)';
  const infoColor  = b.grade === 'A' ? 'var(--a-info-text)' : b.grade === 'B' ? 'var(--b-info-text)' : 'var(--c-info-text)';
  const urgentHtml = days <= 7
    ? `<span style="color:#ef4444;font-weight:700;margin-left:6px">D-${days}</span>`
    : `<span style="color:var(--text3);margin-left:6px">D-${days}</span>`;

  // 투찰전략 3단 (공격형·권장형·안정형) — 상세 모달에는 3개 모두 표시
  const st = getStrategies(b);
  const stratCell = (cls, mark, name, rate, amt) => `
    <div class="strat-card ${cls}">
      <div class="strat-name">${mark} ${name}</div>
      <div class="strat-rate">${(rate !== '' && rate != null) ? rate + '<small>%</small>' : '-'}</div>
      <div class="strat-amt">${(amt !== '' && amt != null) ? amt.toLocaleString() + '원' : '-'}</div>
    </div>`;
  const hasStrategy = (st.aggR !== '' && st.aggR != null) || (st.recR !== '' && st.recR != null) || (st.safeR !== '' && st.safeR != null);
  const strategyHtml = hasStrategy ? `
    <div class="strategy-block">
      <div class="modal-field-label">투찰전략 (사정률 · 투찰금액)</div>
      <div class="strategy-grid">
        ${stratCell('strat-aggressive', '⚡', '공격형', st.aggR, st.aggA)}
        ${stratCell('strat-recommended', '◎', '권장형', st.recR, st.recA)}
        ${stratCell('strat-safe', '🛡', '안정형', st.safeR, st.safeA)}
      </div>
    </div>` : '';

  document.getElementById('detailModalBody').innerHTML = `
    <div class="modal-grade-row" style="background:${infoBg}">
      <span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;background:${badgeBg};color:white;flex-shrink:0">${gradeMark} ${gradeLabel}</span>
      <span class="modal-bid-name">${esc(b.name)}</span>
    </div>
    <div class="modal-grid">
      <div class="modal-field">
        <div class="modal-field-label">공고번호</div>
        <div class="modal-field-value" style="font-family:'JetBrains Mono',monospace;font-size:11px">${esc(b.no)}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">발주기관</div>
        <div class="modal-field-value">${esc(b.org)}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">지역</div>
        <div class="modal-field-value">${ZONE_EMO[b.zone]||'📍'} ${esc(b.zone)}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">공종</div>
        <div class="modal-field-value">${TYPE_EMO[b.type]||'🔧'} ${esc(b.type)}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">기초금액</div>
        <div class="modal-field-value" style="font-family:'JetBrains Mono',monospace">${fmtMoney(b.amount)}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">마감일</div>
        <div class="modal-field-value" style="font-family:'JetBrains Mono',monospace">${b.deadline}${urgentHtml}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">추천점수</div>
        <div class="modal-field-value" style="font-family:'JetBrains Mono',monospace">${b.score}점</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">등급</div>
        <div class="modal-field-value">${b.grade}등급 (${gradeLabel})</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">신뢰도</div>
        <div class="modal-field-value">${b.reliability ? relBadge(b.reliability) : '-'}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">예상낙찰률</div>
        <div class="modal-field-value" style="font-family:'JetBrains Mono',monospace">${b.rate ? b.rate + '%' : '-'}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">추천사정률범위</div>
        <div class="modal-field-value" style="font-family:'JetBrains Mono',monospace">${b.rateRange ? esc(b.rateRange) : '-'}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">평균참가수</div>
        <div class="modal-field-value" style="font-family:'JetBrains Mono',monospace">${(b.avgParticipants !== '' && b.avgParticipants != null) ? b.avgParticipants + '개사' : '-'}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">경쟁도</div>
        <div class="modal-field-value">${b.competitionLevel ? compBadge(b.competitionLevel) : '-'}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">발주처평균낙찰률</div>
        <div class="modal-field-value" style="font-family:'JetBrains Mono',monospace">${b.ownerRate ? b.ownerRate + '%' : '-'}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">발주처분석건수</div>
        <div class="modal-field-value" style="font-family:'JetBrains Mono',monospace">${(b.ownerCount !== '' && b.ownerCount != null) ? b.ownerCount + '건' : '-'}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">발주처신뢰도</div>
        <div class="modal-field-value">${b.ownerReliability ? relBadge(b.ownerReliability) : '-'}</div>
      </div>
    </div>
    ${strategyHtml}
    <div class="modal-reason" style="background:${infoBg};color:${infoColor}">
      <strong>💡 판단사유</strong><br><span style="margin-top:4px;display:block">${esc(b.reason)}</span>
    </div>
  `;

  document.getElementById('modalG2bBtn').onclick = () =>
    window.open(b.detailUrl || 'https://www.g2b.go.kr/', '_blank');

  document.getElementById('detailModal').classList.add('active');
}

function closeDetailModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function closeModal(e) {
  if (e.target === document.getElementById('detailModal')) closeDetailModal();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetailModal();
});

/* ═══ 다크모드 ══════════════════════════════════════════════ */
function initTheme() {
  const saved = localStorage.getItem('nara-theme');
  const dark = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme:dark)').matches);
  setTheme(dark);
}
function setTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('iconSun').style.display  = dark ? ''  : 'none';
  document.getElementById('iconMoon').style.display = dark ? 'none' : '';
  localStorage.setItem('nara-theme', dark ? 'dark' : 'light');
}
document.getElementById('themeBtn').addEventListener('click', () => {
  setTheme(document.documentElement.getAttribute('data-theme') !== 'dark');
});

/* ═══ 필터 이벤트 ═══════════════════════════════════════════ */
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const filter = chip.dataset.filter;
    const val    = chip.dataset.val;
    document.querySelectorAll(`.chip[data-filter="${filter}"]`).forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    state[filter] = val;
    render();
  });
});
document.getElementById('searchInput').addEventListener('input', e => {
  state.search = e.target.value;
  render();
});
document.getElementById('resetBtn').addEventListener('click', () => {
  state = { zone:'전체', type:'전체', grade:'전체', search:'' };
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.dataset.val === '전체');
  });
  render();
});

/* ═══ 초기 실행 ═════════════════════════════════════════════ */
async function init() {
  applyCompanyBranding();
  try {
    BIDS = await loadBids();
  } catch (e) {
    console.error('[loadBids 오류]', e);
    BIDS = SAMPLE_BIDS;
  }
  renderKPI();
  render();
}

initTheme();
init();
</script>
</body>
</html>
